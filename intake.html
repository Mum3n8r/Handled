<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Started — Handled</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#f5f0ea;
  --surface:#fdfaf6;
  --surface-alt:#f0ebe3;
  --border:#e0d6cc;
  --border-strong:#c8bab0;
  --text:#1e1612;
  --text-dim:#6b5d52;
  --muted:#a09082;
  --green:#15803d;
  --green-dim:rgba(21,128,61,0.1);
  --orange:#d4500a;
  --orange-light:#f4874a;
  --orange-dim:rgba(212,80,10,0.10);
}

html, body { height:100%; }
body {
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* ── NAV ── */
nav {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 40px;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
.nav-brand { font-size:17px; font-weight:700; letter-spacing:-0.02em; text-decoration:none; color:var(--text); }
.nav-back { font-size:13px; color:var(--text-dim); display:flex; align-items:center; gap:6px; text-decoration:none; transition:color 0.15s; }
.nav-back:hover { color:var(--text); }

/* ── PLAN HEADER ── */
.plan-header {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:16px 40px;
  display:flex;
  align-items:center;
  gap:16px;
  flex-shrink:0;
}
.plan-badge {
  display:inline-flex;
  align-items:center;
  gap:7px;
  background:var(--orange-dim);
  border:1px solid rgba(212,80,10,0.22);
  color:var(--orange);
  font-size:11px;
  padding:4px 12px;
  border-radius:20px;
  font-family:'Inter',sans-serif;
  font-weight:800;
  letter-spacing:0.05em;
  text-transform:uppercase;
}
.plan-desc { font-size:13px; color:var(--text-dim); }
.plan-desc strong { color:var(--text); }

/* ── MAIN LAYOUT ── */
.main {
  flex:1;
  display:grid;
  grid-template-columns:340px 1fr;
  min-height:0;
}

/* ── SIDEBAR ── */
.sidebar {
  background:var(--surface);
  border-right:1px solid var(--border);
  padding:32px 28px;
  display:flex;
  flex-direction:column;
  gap:8px;
  overflow-y:auto;
}
.sidebar-title {
  font-size:11px;
  font-family:'DM Mono',monospace;
  color:var(--muted);
  letter-spacing:0.12em;
  text-transform:uppercase;
  margin-bottom:8px;
}
.checklist-item {
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:14px 16px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--bg);
  transition:all 0.3s ease;
}
.checklist-item.done {
  background:var(--green-dim);
  border-color:rgba(21,128,61,0.25);
}
.checklist-item.active {
  background:var(--surface);
  border-color:var(--orange);
  box-shadow:0 0 0 3px var(--orange-dim);
}
.ci-icon {
  width:28px; height:28px;
  border-radius:8px;
  background:var(--surface-alt);
  border:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  font-size:13px;
  transition:all 0.3s ease;
}
.checklist-item.done .ci-icon {
  background:var(--green-dim);
  border-color:rgba(21,128,61,0.3);
}
.checklist-item.active .ci-icon {
  background:var(--orange-dim);
  border-color:rgba(212,80,10,0.3);
}
.ci-text { flex:1; min-width:0; }
.ci-label { font-size:13px; font-weight:700; margin-bottom:2px; transition:color 0.3s; }
.checklist-item.done .ci-label { color:var(--green); }
.checklist-item.active .ci-label { color:var(--orange); }
.ci-value {
  font-size:12px;
  color:var(--text-dim);
  line-height:1.4;
  font-style:italic;
  opacity:0;
  max-height:0;
  overflow:hidden;
  transition:opacity 0.3s ease, max-height 0.3s ease;
}
.checklist-item.done .ci-value { opacity:1; max-height:60px; }

.sidebar-progress {
  margin-top:auto;
  padding-top:20px;
  border-top:1px solid var(--border);
}
.progress-label {
  display:flex;
  justify-content:space-between;
  font-size:11px;
  font-family:'DM Mono',monospace;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.1em;
  margin-bottom:8px;
}
.progress-bar {
  height:4px;
  background:var(--border);
  border-radius:2px;
  overflow:hidden;
}
.progress-fill {
  height:100%;
  background:linear-gradient(90deg, var(--orange), var(--orange-light));
  border-radius:2px;
  transition:width 0.5s ease;
  width:0%;
}

/* ── CHAT AREA ── */
.chat-area {
  display:flex;
  flex-direction:column;
  min-height:0;
  position:relative;
}

.chat-messages {
  flex:1;
  overflow-y:auto;
  padding:32px 40px;
  display:flex;
  flex-direction:column;
  gap:16px;
  scroll-behavior:smooth;
}
.chat-messages::-webkit-scrollbar { width:4px; }
.chat-messages::-webkit-scrollbar-track { background:transparent; }
.chat-messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.msg {
  display:flex;
  gap:12px;
  align-items:flex-end;
  animation:msgIn 0.22s ease;
  max-width:680px;
}
@keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg-ai { align-self:flex-start; }
.msg-user { align-self:flex-end; flex-direction:row-reverse; }

.msg-avatar {
  width:32px; height:32px;
  border-radius:50%;
  background:var(--orange-dim);
  border:1px solid rgba(212,80,10,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  flex-shrink:0;
}
.msg-bubble {
  padding:12px 16px;
  border-radius:16px;
  font-size:14px;
  line-height:1.65;
  max-width:520px;
}
.msg-ai .msg-bubble {
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  border-bottom-left-radius:4px;
}
.msg-user .msg-bubble {
  background:var(--orange);
  color:#fff;
  border-bottom-right-radius:4px;
}
.msg-typing {
  background:var(--surface);
  border:1px solid var(--border);
  padding:14px 18px;
  border-radius:16px;
  border-bottom-left-radius:4px;
}
.dots { display:flex; gap:4px; align-items:center; }
.dots span {
  width:6px; height:6px;
  background:var(--muted);
  border-radius:50%;
  animation:dot 1.2s infinite;
}
.dots span:nth-child(2) { animation-delay:0.2s; }
.dots span:nth-child(3) { animation-delay:0.4s; }
@keyframes dot { 0%,80%,100%{transform:scale(0.8);opacity:0.4} 40%{transform:scale(1.1);opacity:1} }

/* done state */
.chat-done {
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  flex:1;
  padding:48px 40px;
  text-align:center;
  gap:16px;
}
.done-icon { font-size:48px; }
.done-title { font-family:'Inter',sans-serif; font-size:26px; font-weight:800; letter-spacing:-0.03em; }
.done-sub { font-size:16px; color:var(--text-dim); line-height:1.6; max-width:420px; }
.done-redirect { font-size:13px; color:var(--muted); font-family:'DM Mono',monospace; margin-top:8px; }
.done-btn {
  display:inline-block;
  background:var(--orange);
  color:#fff;
  padding:14px 32px;
  border-radius:10px;
  font-size:15px;
  font-weight:700;
  margin-top:8px;
  transition:all 0.15s;
  box-shadow:0 2px 14px rgba(212,80,10,0.3);
  text-decoration:none;
}
.done-btn:hover { background:#b84208; transform:translateY(-1px); }
.done-btn-custom {
  background:transparent;
  color:var(--text);
  border:1px solid var(--border-strong);
  box-shadow:none;
}
.done-btn-custom:hover { background:var(--border); transform:translateY(-1px); }

/* ── INPUT BAR ── */
.chat-input-bar {
  padding:20px 40px;
  border-top:1px solid var(--border);
  background:var(--surface);
  display:flex;
  gap:10px;
  align-items:flex-end;
  flex-shrink:0;
}
#chat-input {
  flex:1;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px 16px;
  font-size:14px;
  font-family:'DM Sans',sans-serif;
  color:var(--text);
  resize:none;
  outline:none;
  transition:border-color 0.15s;
  max-height:120px;
  line-height:1.5;
}
#chat-input:focus { border-color:var(--orange); }
#chat-input::placeholder { color:var(--muted); }
#send-btn {
  width:44px; height:44px;
  background:var(--orange);
  border:none;
  border-radius:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all 0.15s;
  flex-shrink:0;
}
#send-btn:hover { background:#b84208; transform:translateY(-1px); }
#send-btn:disabled { opacity:0.38; cursor:not-allowed; transform:none; }
#send-btn svg { width:18px; height:18px; color:#fff; }

/* ── RESPONSIVE ── */
@media (max-width:760px) {
  nav, .plan-header { padding:0 16px; }
  .main { grid-template-columns:1fr; }
  .sidebar { display:none; }
  .chat-messages { padding:20px 16px; }
  .chat-input-bar { padding:14px 16px; }
  .msg-bubble { max-width:90vw; }
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">Handled</a>
  <a href="/" class="nav-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    Back
  </a>
</nav>

<div class="plan-header" id="planHeader">
  <div class="plan-badge" id="planBadge">Loading...</div>
  <div class="plan-desc" id="planDesc"></div>
</div>

<div class="main">

  <!-- Sidebar checklist -->
  <div class="sidebar">
    <div class="sidebar-title">What we need to know</div>

    <div class="checklist-item active" id="ci-business">
      <div class="ci-icon">🏢</div>
      <div class="ci-text">
        <div class="ci-label">Your business</div>
        <div class="ci-value" id="cv-business"></div>
      </div>
    </div>

    <div class="checklist-item" id="ci-pain">
      <div class="ci-icon">⏱</div>
      <div class="ci-text">
        <div class="ci-label">Biggest time drain</div>
        <div class="ci-value" id="cv-pain"></div>
      </div>
    </div>

    <div class="checklist-item" id="ci-tools">
      <div class="ci-icon">🔧</div>
      <div class="ci-text">
        <div class="ci-label">Tools you use</div>
        <div class="ci-value" id="cv-tools"></div>
      </div>
    </div>

    <div class="checklist-item" id="ci-contact">
      <div class="ci-icon">📬</div>
      <div class="ci-text">
        <div class="ci-label">Your contact info</div>
        <div class="ci-value" id="cv-contact"></div>
      </div>
    </div>

    <div class="sidebar-progress">
      <div class="progress-label">
        <span>Progress</span>
        <span id="progress-pct">0 / 4</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area">
    <div class="chat-messages" id="chat-messages"></div>

    <div class="chat-done" id="chat-done">
      <div class="done-icon">✅</div>
      <div class="done-title">You're all set.</div>
      <div class="done-sub" id="done-sub">Thanks for the info. Taking you to checkout now.</div>
      <div class="done-redirect" id="done-redirect"></div>
      <a href="#" class="done-btn" id="done-cta">Continue to checkout →</a>
    </div>

    <div class="chat-input-bar" id="input-bar">
      <textarea id="chat-input" placeholder="Type your answer..." rows="1"></textarea>
      <button id="send-btn" onclick="sendMsg()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
  </div>

</div>

<script>
const PROXY = 'https://duvet-habitant-stimulate.ngrok-free.dev/chat';
const INTAKE = 'https://duvet-habitant-stimulate.ngrok-free.dev/intake';

const PLANS = {
  starter: {
    label: 'Starter Plan',
    desc: '<strong>$150 one-time</strong> — one automation, live in 3 days',
    stripeUrl: 'https://buy.stripe.com/test_fZu9AS740a9y24K8Bnb3q00',
    systemNote: 'The customer has selected the Starter plan ($150 one-time setup, one automation of their choice). Do NOT ask which plan they want — they already chose. Skip plan selection entirely.',
  },
  full: {
    label: 'Full Setup Plan',
    desc: '<strong>$300 setup + $50/month</strong> — full automation suite, maintained monthly',
    stripeUrl: 'https://buy.stripe.com/test_5kQ5kCewsa9yfVA8Bnb3q01',
    systemNote: 'The customer has selected the Full Setup plan ($300 setup + $50/month maintenance, full automation suite). Do NOT ask which plan they want — they already chose. Skip plan selection entirely.',
  },
  custom: {
    label: 'Custom Work',
    desc: '<strong>Custom scope</strong> — larger or more complex requirements',
    stripeUrl: null,
    systemNote: 'The customer is inquiring about custom work (larger scope, multi-location, or unusual requirements). Do NOT ask which plan they want — they already chose custom. Skip plan selection entirely. At the end, instead of directing them to Stripe, let them know the team will reach out within 24 hours.',
  },
};

const SYSTEM_PROMPT_BASE = `You are the intake assistant for Handled, a done-for-you AI automation service for local businesses. Your job is to have a short, warm conversation to understand the customer's situation before they check out.

{PLAN_NOTE}

You need to collect exactly these four things, one at a time, in a natural conversational way:
1. Their business type (e.g. HVAC, cleaning, landscaping, salon, dental office, etc.)
2. Their biggest operational pain point — what's eating their time most (e.g. following up on leads, scheduling, responding to reviews, data entry)
3. What tools or software they currently use (e.g. Google Sheets, QuickBooks, Jobber, ServiceTitan — or just "nothing yet")
4. Their name and email address for setup coordination

Keep responses short — 1 to 3 sentences max. Be warm and direct. Do not ask multiple questions at once. Do not ask about their plan — that is already decided.

As you learn each piece of info, confirm it briefly before moving on.

Once you have all four pieces, give a warm 2-sentence closing that summarizes what you'll be automating for them, then output this exact JSON on its own line with no other text around it:
INTAKE_DONE:{"name":"...","email":"...","business_type":"...","biggest_pain":"...","tools_used":"...","plan_interest":"..."}

For plan_interest use the plan key: starter, full, or custom.
Do not output the INTAKE_DONE line until you have all four pieces of information.`;

// ── State ──
const params = new URLSearchParams(window.location.search);
const planKey = params.get('plan') || 'full';
const plan = PLANS[planKey] || PLANS.full;

let messages = [];
let collected = { business: null, pain: null, tools: null, contact: null };
let done = false;
  let emailContext = null;  // populated from ?email param on load
let emailContext = null;  // populated from ?email param on load

// ── Init plan header ──
document.getElementById('planBadge').textContent = plan.label;
document.getElementById('planDesc').innerHTML = plan.desc;

// ── Checklist helpers ──
const checkItems = ['business','pain','tools','contact'];
function setActive(key) {
  checkItems.forEach(k => {
    const el = document.getElementById('ci-' + k);
    if (!collected[k]) {
      el.classList.toggle('active', k === key);
    }
  });
}
function markDone(key, value) {
  if (collected[key]) return;
  collected[key] = value;
  const el = document.getElementById('ci-' + key);
  el.classList.remove('active');
  el.classList.add('done');
  el.querySelector('.ci-icon').textContent = '✓';
  document.getElementById('cv-' + key).textContent = value;
  updateProgress();
  // set next active
  const idx = checkItems.indexOf(key);
  for (let i = idx + 1; i < checkItems.length; i++) {
    if (!collected[checkItems[i]]) { setActive(checkItems[i]); break; }
  }
}
function updateProgress() {
  const n = Object.values(collected).filter(Boolean).length;
  document.getElementById('progress-pct').textContent = n + ' / 4';
  document.getElementById('progress-fill').style.width = (n / 4 * 100) + '%';
}

// ── Parse AI reply for checklist signals ──
// The AI is asked to confirm each piece — we scan its reply for patterns
function parseReplyForChecklist(reply) {
  const r = reply.toLowerCase();
  // Business
  if (!collected.business) {
    const biz = reply.match(/(?:you(?:'re| run| own| operate)|sounds like you(?:'re| have)|got it[^.]*(?:run|own|operate)|(?:salon|hvac|cleaning|landscaping|dental|restaurant|gym|plumbing|law|medical|retail|spa|barbershop|contractor|electrician|roofer|painting|moving|photography|bakery|food)[^.]*)/i);
    if (biz) markDone('business', biz[0].slice(0,60).trim());
  }
  // Pain
  if (!collected.pain && collected.business) {
    const pain = reply.match(/(?:follow.?up|booking|scheduling|review|data entry|manual|repetitive|eating your time|time.?sink|back.?and.?forth)[^.]{0,80}/i);
    if (pain) markDone('pain', pain[0].slice(0,60).trim());
  }
  // Tools
  if (!collected.tools && collected.pain) {
    const tools = reply.match(/(?:google sheets|quickbooks|jobber|servicetitan|housecall|square|mindbody|acuity|calendly|salesforce|hubspot|nothing yet|no tools|no software|spreadsheet)[^.]{0,60}/i);
    if (tools) markDone('tools', tools[0].slice(0,60).trim());
  }
  // Contact
  if (!collected.contact && collected.tools) {
    const email = reply.match(/\b[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}\b/);
    if (email) markDone('contact', email[0]);
  }
}

// ── Chat UI ──
function appendMsg(text, role) {
  const wrap = document.createElement('div');
  wrap.className = 'msg msg-' + role;
  if (role === 'ai') {
    wrap.innerHTML = `<div class="msg-avatar">⚡</div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  } else {
    wrap.innerHTML = `<div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div>`;
  }
  document.getElementById('chat-messages').appendChild(wrap);
  scroll();
}
function showTyping() {
  const el = document.createElement('div');
  el.className = 'msg msg-ai'; el.id = 'typing-indicator';
  el.innerHTML = `<div class="msg-avatar">⚡</div><div class="msg-typing"><div class="dots"><span></span><span></span><span></span></div></div>`;
  document.getElementById('chat-messages').appendChild(el);
  scroll();
}
function removeTyping() { const t=document.getElementById('typing-indicator'); if(t)t.remove(); }
function scroll() { const m=document.getElementById('chat-messages'); m.scrollTop=m.scrollHeight; }

// ── Finish ──
function finish(intakeData) {
  done = true;
  // Mark all done
  if (!collected.contact && intakeData.email) markDone('contact', intakeData.email);
  if (!collected.business && intakeData.business_type) markDone('business', intakeData.business_type);
  if (!collected.pain && intakeData.biggest_pain) markDone('pain', intakeData.biggest_pain);
  if (!collected.tools && intakeData.tools_used) markDone('tools', intakeData.tools_used);

  // Send to intake endpoint
  intakeData.plan_interest = planKey;
  intakeData.ts = new Date().toISOString();
  fetch(INTAKE, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(intakeData) }).catch(()=>{});

  // Show done state
  const messagesEl = document.getElementById('chat-messages');
  const inputBar = document.getElementById('input-bar');
  const doneEl = document.getElementById('chat-done');

  messagesEl.style.display = 'none';
  inputBar.style.display = 'none';
  doneEl.style.display = 'flex';

  if (planKey === 'custom') {
    document.getElementById('done-sub').textContent = "We have everything we need. Leland will reach out to " + intakeData.email + " within 24 hours to scope out your setup.";
    document.getElementById('done-redirect').textContent = '';
    const cta = document.getElementById('done-cta');
    cta.textContent = 'Back to home';
    cta.href = '/';
    cta.className = 'done-btn done-btn-custom';
  } else {
    document.getElementById('done-sub').textContent = "All set. Taking you to secure checkout — your setup will be live within 3 business days.";
    document.getElementById('done-redirect').textContent = 'Redirecting in 5 seconds...';
    document.getElementById('done-cta').href = plan.stripeUrl;
    document.getElementById('done-cta').textContent = 'Go to checkout →';
    let t = 5;
    const timer = setInterval(() => {
      t--;
      if (t <= 0) { clearInterval(timer); window.location.href = plan.stripeUrl; }
      else { document.getElementById('done-redirect').textContent = 'Redirecting in ' + t + ' seconds...'; }
    }, 1000);
  }
}

// ── API call ──
async function callProxy(msgs) {
  const r = await fetch(PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: msgs, plan: planKey, transcript: msgs, email_context: emailContext || null }),
  });
  if (!r.ok) throw new Error('proxy ' + r.status);
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  // If server already handled INTAKE_COMPLETE tag
  if (d.intake_complete) return { reply: d.reply, intakeDone: true, data: null };
  return { reply: d.reply, intakeDone: false, data: null };
}

// ── Process reply ──
function processReply(raw) {
  // Check for INTAKE_DONE line
  const doneMatch = raw.match(/INTAKE_DONE:(\{.*?\})/);
  if (doneMatch) {
    try {
      const data = JSON.parse(doneMatch[1]);
      const cleanReply = raw.replace(/INTAKE_DONE:\{.*?\}/, '').trim();
      return { text: cleanReply, done: true, data };
    } catch(e) {}
  }
  // Also catch server-side intake_complete signal
  return { text: raw, done: false, data: null };
}

// ── Send ──
window.sendMsg = async function() {
  if (done) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  messages.push({ role: 'user', content: text });
  appendMsg(text, 'user');
  showTyping();

  try {
    const { reply, intakeDone } = await callProxy(messages);
    removeTyping();
    document.getElementById('send-btn').disabled = false;

    const { text: cleanText, done: isDone, data } = processReply(reply);

    if (cleanText) {
      messages.push({ role: 'assistant', content: cleanText });
      appendMsg(cleanText, 'ai');
      parseReplyForChecklist(cleanText);
    }

    if (isDone && data) {
      setTimeout(() => finish(data), 600);
    } else if (intakeDone) {
      // Server handled it — build data from collected
      setTimeout(() => finish({
        name: collected.contact || '',
        email: collected.contact || '',
        business_type: collected.business || '',
        biggest_pain: collected.pain || '',
        tools_used: collected.tools || '',
      }), 600);
    }
  } catch(e) {
    removeTyping();
    document.getElementById('send-btn').disabled = false;
    appendMsg("Something went wrong on our end — please try again.", 'ai');
  }
};

// ── Input auto-resize + enter key ──
document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// ── Start conversation ──
(async function start() {
  setActive('business');

  // Load email context if ?email param present (from outreach CTA link)
  const incomingEmail = params.get('email') || '';
  if (incomingEmail) {
    try {
      const ctxRes = await fetch('https://duvet-habitant-stimulate.ngrok-free.dev/context?email=' + encodeURIComponent(incomingEmail));
      if (ctxRes.ok) {
        const ctx = await ctxRes.json();
        if (ctx && ctx.business_name) emailContext = ctx;
      }
    } catch(e) { /* context unavailable */ }
  }

  let opening;
  if (emailContext && emailContext.business_name) {
    const hook = emailContext.pain_hook;
    if (hook) {
      opening = `Hey! Thanks for checking out Handled. To build the right setup for ${emailContext.business_name}, what is the most repetitive thing eating your time day to day?`;
    } else {
      opening = `Hey! Thanks for checking out Handled. To build the right setup for ${emailContext.business_name}, what is the most repetitive thing eating your time day to day?`;
    }
  } else {
    opening = planKey === 'custom'
      ? "Hey! Happy to help figure out the right setup for you. What kind of business do you run?"
      : "Hey! Quick questions before checkout so we build exactly what you need. What kind of business do you run?";
  }

  messages.push({ role: 'assistant', content: opening });
  appendMsg(opening, 'ai');
  setTimeout(() => document.getElementById('chat-input').focus(), 100);
})();
</script>
