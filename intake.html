<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Started — Handled</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#f5f0ea;
  --surface:#fdfaf6;
  --surface-alt:#f0ebe3;
  --border:#e0d6cc;
  --border-strong:#c8bab0;
  --text:#1e1612;
  --text-dim:#6b5d52;
  --muted:#a09082;
  --green:#15803d;
  --green-dim:rgba(21,128,61,0.1);
  --orange:#d4500a;
  --orange-light:#f4874a;
  --orange-dim:rgba(212,80,10,0.10);
}

html, body { height:100%; }
body {
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}
a { color:inherit; }

/* ── NAV ── */
nav {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 40px;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
.nav-brand { font-size:17px; font-weight:700; letter-spacing:-0.02em; text-decoration:none; color:var(--text); }
.nav-back { font-size:13px; color:var(--text-dim); display:flex; align-items:center; gap:6px; text-decoration:none; transition:color 0.15s; }
.nav-back:hover { color:var(--text); }

/* ── PLAN HEADER ── */
.plan-header {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:16px 40px;
  display:flex;
  align-items:center;
  gap:16px;
  flex-shrink:0;
}
.plan-badge {
  display:inline-flex;
  align-items:center;
  gap:7px;
  background:var(--orange-dim);
  border:1px solid rgba(212,80,10,0.22);
  color:var(--orange);
  font-size:11px;
  padding:4px 12px;
  border-radius:20px;
  font-family:'Inter',sans-serif;
  font-weight:800;
  letter-spacing:0.05em;
  text-transform:uppercase;
}
.plan-desc { font-size:13px; color:var(--text-dim); }
.plan-desc strong { color:var(--text); }

/* ── SMART FORM ── */
.sf-main {
  flex:1;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:9vh 24px 48px;
}
.sf-card {
  width:100%;
  max-width:620px;
}
.sf-progress {
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:36px;
}
.sf-progress-bar {
  flex:1;
  height:4px;
  background:var(--surface-alt);
  border-radius:4px;
  overflow:hidden;
}
.sf-progress-fill {
  height:100%;
  width:0%;
  background:var(--orange);
  border-radius:4px;
  transition:width 0.45s cubic-bezier(.77,0,.18,1);
}
.sf-progress-label {
  font-family:'DM Mono',monospace;
  font-size:11px;
  color:var(--muted);
  white-space:nowrap;
}
.sf-question {
  font-family:'Inter',sans-serif;
  font-size:clamp(22px, 3.4vw, 30px);
  font-weight:700;
  letter-spacing:-0.02em;
  line-height:1.3;
  margin-bottom:26px;
  min-height:1.3em;
}
.sf-step { animation:sfIn 0.35s ease both; }
@keyframes sfIn {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
.sf-input {
  width:100%;
  padding:16px 18px;
  border:1px solid var(--border-strong);
  border-radius:12px;
  font-size:16px;
  font-family:'DM Sans',sans-serif;
  background:var(--surface);
  color:var(--text);
  outline:none;
  resize:none;
  transition:border-color 0.15s, box-shadow 0.15s;
}
.sf-input:focus { border-color:var(--orange); box-shadow:0 0 0 3px var(--orange-dim); }
.sf-hint { font-size:13px; color:var(--muted); margin-top:10px; min-height:1.2em; }
.sf-error {
  display:none;
  color:#c0392b;
  font-size:13px;
  padding:10px 14px;
  margin-top:12px;
  background:rgba(192,57,43,0.08);
  border:1px solid rgba(192,57,43,0.2);
  border-radius:8px;
}
.sf-actions {
  display:flex;
  align-items:center;
  gap:16px;
  margin-top:22px;
}
.sf-next {
  background:var(--orange);
  color:#fff;
  border:none;
  padding:14px 30px;
  border-radius:10px;
  font-size:15px;
  font-weight:700;
  font-family:'DM Sans',sans-serif;
  cursor:pointer;
  transition:all 0.15s;
  box-shadow:0 2px 14px rgba(212,80,10,0.3);
}
.sf-next:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 4px 18px rgba(212,80,10,0.38); }
.sf-next:disabled { opacity:0.6; cursor:default; }
.sf-enter-tip { font-size:12px; color:var(--muted); }
.sf-enter-tip kbd {
  font-family:'DM Mono',monospace;
  font-size:11px;
  border:1px solid var(--border);
  border-radius:4px;
  padding:1px 5px;
  background:var(--surface);
}
.sf-trust {
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:44px;
  font-size:12px;
  color:var(--muted);
}
.sf-trust svg { flex-shrink:0; }

/* ── DONE CARD ── */
.sf-done {
  display:none;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:14px;
  padding-top:4vh;
  animation:sfIn 0.35s ease both;
}
.done-icon { font-size:40px; }
.done-title { font-family:'Inter',sans-serif; font-size:26px; font-weight:800; letter-spacing:-0.02em; }
.done-sub { font-size:15px; color:var(--text-dim); line-height:1.6; max-width:440px; }
.done-redirect { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); min-height:1.2em; }
.done-btn {
  display:inline-block;
  margin-top:8px;
  background:var(--orange);
  color:#fff;
  padding:14px 30px;
  border-radius:10px;
  font-size:15px;
  font-weight:700;
  text-decoration:none;
  transition:all 0.15s;
  box-shadow:0 2px 14px rgba(212,80,10,0.3);
}
.done-btn:hover { transform:translateY(-1px); }
.done-btn[aria-disabled="true"] { opacity:0.6; pointer-events:none; }
.done-btn-quiet {
  background:var(--surface);
  color:var(--text);
  border:1px solid var(--border-strong);
  box-shadow:none;
}
.done-btn-quiet:hover { background:var(--surface-alt); }

@media (max-width:600px) {
  nav, .plan-header { padding-left:20px; padding-right:20px; }
  .sf-main { padding-top:5vh; }
}
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">Handled</a>
  <a class="nav-back" href="/">&larr; Back</a>
</nav>

<div class="plan-header">
  <div class="plan-badge" id="planBadge">Loading...</div>
  <div class="plan-desc" id="planDesc"></div>
</div>

<div class="sf-main">
  <div class="sf-card">

    <div id="sf-form">
      <div class="sf-progress">
        <div class="sf-progress-bar"><div class="sf-progress-fill" id="sf-fill"></div></div>
        <div class="sf-progress-label" id="sf-count">1 of 5</div>
      </div>

      <div class="sf-step" id="sf-step">
        <div class="sf-question" id="sf-question"></div>
        <textarea class="sf-input" id="sf-input" rows="2" placeholder=""></textarea>
        <div class="sf-hint" id="sf-hint"></div>
        <div class="sf-error" id="sf-error"></div>
        <div class="sf-actions">
          <button class="sf-next" id="sf-next" onclick="submitAnswer()">Continue &rarr;</button>
          <span class="sf-enter-tip">press <kbd>Enter</kbd></span>
        </div>
      </div>

      <div class="sf-trust">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2" width="14" height="14" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span>Secure checkout via Stripe &middot; live in 3 business days &middot; full refund guarantee</span>
      </div>
    </div>

    <div class="sf-done" id="sf-done">
      <div class="done-icon">&#9989;</div>
      <div class="done-title" id="done-title">You're all set.</div>
      <div class="done-sub" id="done-sub"></div>
      <div class="done-redirect" id="done-redirect"></div>
      <a href="#" class="done-btn" id="done-cta">Continue to checkout &rarr;</a>
    </div>

  </div>
</div>

<script>
// ── Config ──
const SB_URL  = 'https://vjwrsucmfqiathgcemzh.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqd3JzdWNtZnFpYXRoZ2NlbXpoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzIwMTIsImV4cCI6MjA5NzgwODAxMn0.g_9brBnhdLgWAfFedjlMX_m9tfImdYcajIH4QTpo-F8';
const API = '/api/intake-next';

const PLANS = {
  starter: {
    label: 'Starter Plan',
    desc: '<strong>$497 one-time</strong> — one automation, live in 3 days',
    stripeUrl: 'https://buy.stripe.com/6oU9ASeEpd5aa0d7Qx8Ra03',
  },
  full: {
    label: 'Full Setup Plan',
    desc: '<strong>$997 setup + $150/month</strong> — full automation suite, maintained monthly',
    stripeUrl: 'https://buy.stripe.com/3cIcN453P2qwgoBc6N8Ra04',
  },
  custom: {
    label: 'Custom Work',
    desc: '<strong>Custom scope</strong> — larger or more complex requirements',
    stripeUrl: null,
  },
};

const params  = new URLSearchParams(location.search);
const planKey = PLANS[params.get('plan')] ? params.get('plan') : 'full';
const plan    = PLANS[planKey];

document.getElementById('planBadge').textContent = plan.label;
document.getElementById('planDesc').innerHTML = plan.desc;

// ── State ──
const FIELD_KEYS = ['business_type','biggest_pain','tools_used','name','email'];
let fields = { business_type:null, biggest_pain:null, tools_used:null, name:null, email:null };
let transcript = [];
let smart = true;          // flips false the first time the API fails
let questionCount = 0;
const MAX_QUESTIONS = 8;   // hard cap — after this, force-finish with static questions
let currentQuestion = '';
let currentStaticKey = null;
let busy = false;

// email arriving from outreach links prefills and skips that question
const incomingEmail = (params.get('email') || '').trim();
if (incomingEmail && /\S+@\S+\.\S+/.test(incomingEmail)) fields.email = incomingEmail;

const STATIC_QS = [
  { key:'business_type', q:'What kind of business do you run?', hint:'e.g. HVAC, salon, cleaning service, dental office' },
  { key:'biggest_pain',  q:"What's eating the most of your time each week?", hint:'e.g. chasing leads, booking back-and-forth, answering the same questions' },
  { key:'tools_used',    q:'What tools or software do you run things on, if any?', hint:'e.g. Google Sheets, QuickBooks, Jobber — or nothing yet' },
  { key:'name',          q:"What's your name?", hint:'' },
  { key:'email',         q:'Best email for setup coordination?', hint:'you@yourbusiness.com' },
];

// ── UI helpers ──
const qEl    = document.getElementById('sf-question');
const inEl   = document.getElementById('sf-input');
const hintEl = document.getElementById('sf-hint');
const errEl  = document.getElementById('sf-error');
const btnEl  = document.getElementById('sf-next');
const stepEl = document.getElementById('sf-step');

function filledCount() { return FIELD_KEYS.filter(k => fields[k]).length; }
function firstMissing() { return STATIC_QS.find(s => !fields[s.key]) || null; }

function updateProgress() {
  const n = filledCount();
  document.getElementById('sf-fill').style.width = (n / 5 * 100) + '%';
  document.getElementById('sf-count').textContent = Math.min(n + 1, 5) + ' of 5';
}

function showQuestion(q, hint, staticKey) {
  currentQuestion = q;
  currentStaticKey = staticKey || null;
  stepEl.style.animation = 'none';
  void stepEl.offsetWidth; // restart animation
  stepEl.style.animation = '';
  qEl.textContent = q;
  hintEl.textContent = hint || '';
  errEl.style.display = 'none';
  inEl.value = '';
  inEl.placeholder = '';
  const isEmailQ = /email/i.test(q);
  inEl.setAttribute('inputmode', isEmailQ ? 'email' : 'text');
  updateProgress();
  setBusy(false);
  inEl.focus();
}

function setBusy(b) {
  busy = b;
  btnEl.disabled = b;
  inEl.disabled = b;
  btnEl.innerHTML = b ? '&hellip;' : 'Continue &rarr;';
}

function showError(msg) {
  errEl.textContent = msg;
  errEl.style.display = 'block';
}

// ── Flow ──
window.submitAnswer = async function() {
  if (busy) return;
  const answer = inEl.value.trim();
  if (!answer) { showError('A quick answer here helps us build the right thing.'); return; }

  // validate inline when the answer should contain an email
  const needEmail = currentStaticKey === 'email' || (/email/i.test(currentQuestion) && !fields.email);
  const emailMatch = answer.match(/\S+@\S+\.\S+/);
  if (needEmail && !emailMatch) { showError('Please include a valid email address.'); return; }

  errEl.style.display = 'none';
  setBusy(true);
  transcript.push({ q: currentQuestion, a: answer });
  questionCount++;

  // static mode: assign the answer directly
  if (!smart || questionCount >= MAX_QUESTIONS) {
    if (currentStaticKey) fields[currentStaticKey] = answer;
    if (currentStaticKey === 'email' && emailMatch) fields.email = emailMatch[0];
    return advanceStatic();
  }

  // smart mode: let the brain extract + pick the next question
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 11000);
    const r = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ plan: planKey, transcript, fields }),
      signal: controller.signal,
    });
    clearTimeout(timer);
    const d = await r.json();
    if (d && !d.fallback && (d.done || d.next_question)) {
      FIELD_KEYS.forEach(k => { if (d.fields && d.fields[k]) fields[k] = d.fields[k]; });
      if (incomingEmail && !fields.email) fields.email = incomingEmail;
      if (d.done || !firstMissing()) return finish();
      return showQuestion(d.next_question, d.hint);
    }
    throw new Error('fallback');
  } catch (e) {
    // brain unavailable — continue with plain questions, invisibly
    smart = false;
    if (currentStaticKey) {
      fields[currentStaticKey] = answer;
    } else {
      // best-effort guess for the answer we just collected via an AI question
      const guess = firstMissing();
      if (guess) fields[guess.key] = answer;
    }
    return advanceStatic();
  }
};

function advanceStatic() {
  const next = firstMissing();
  if (!next) return finish();
  showQuestion(next.q, next.hint, next.key);
}

inEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitAnswer(); }
});

// ── Finish: save lead, then checkout (or custom handoff) ──
async function finish() {
  // email is non-negotiable — if we somehow got here without one, ask for it
  if (!fields.email || !/\S+@\S+\.\S+/.test(fields.email)) {
    smart = false;
    fields.email = null;
    return showQuestion('Best email for setup coordination?', 'you@yourbusiness.com', 'email');
  }

  setBusy(true);

  // save the lead — best effort, never blocks checkout
  try {
    await fetch(`${SB_URL}/rest/v1/onboarding`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SB_ANON,
        'Authorization': `Bearer ${SB_ANON}`,
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify({
        email: fields.email,
        name: fields.name || '',
        business_name: fields.business_type || '',
        business_type: fields.business_type || '',
        biggest_pain: fields.biggest_pain || '',
        tools_used: fields.tools_used || '',
        plan_interest: planKey,
        scope_confirmed: false,
        source: 'smart_form',
        ts: new Date().toISOString(),
      }),
    });
  } catch (e) { /* checkout matters more than the lead row */ }

  document.getElementById('sf-form').style.display = 'none';
  const doneEl = document.getElementById('sf-done');
  doneEl.style.display = 'flex';
  const cta = document.getElementById('done-cta');
  const firstName = (fields.name || '').split(' ')[0];

  if (planKey === 'custom') {
    document.getElementById('done-sub').textContent =
      `We have everything we need${firstName ? ', ' + firstName : ''}. We'll reach out to ${fields.email} within 24 hours to scope out your setup.`;
    cta.textContent = 'Back to home';
    cta.href = '/';
    cta.className = 'done-btn done-btn-quiet';
    return;
  }

  const checkoutUrl = plan.stripeUrl + '?prefilled_email=' + encodeURIComponent(fields.email);
  document.getElementById('done-sub').textContent =
    `Thanks${firstName ? ' ' + firstName : ''} — taking you to secure checkout. Your setup will be live within 3 business days.`;
  cta.href = checkoutUrl;
  cta.textContent = 'Go to checkout →';

  let t = 3;
  const redirectEl = document.getElementById('done-redirect');
  redirectEl.textContent = 'Redirecting in 3…';
  const timer = setInterval(() => {
    t--;
    if (t <= 0) { clearInterval(timer); window.location.href = checkoutUrl; }
    else { redirectEl.textContent = 'Redirecting in ' + t + '…'; }
  }, 1000);
}

// ── Start ──
(function start() {
  const first = STATIC_QS[0];
  showQuestion(first.q, first.hint, first.key);
})();
</script>
</body>
</html>
